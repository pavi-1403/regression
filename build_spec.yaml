version: 0.1

component: build

steps:
  - type: Command
    name: Install Maven Dependencies
    command: |
      echo "Installing Maven dependencies"
      mvn clean install -DskipTests

  - type: Command
    name: Run Tests (Regression Testing)
    command: |
      echo "Running tests"
      mvn test

  - type: Command
    name: Build Package
    command: |
      echo "Packaging application"
      mvn package
